name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run default pytest suite
        run: timeout -k 5 600 python -m pytest -q
      - name: Verify OpenAPI export is committed
        run: |
          python scripts/export_openapi.py
          git diff --exit-code apps/web/src/api/openapi.json

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cutagent
          POSTGRES_USER: cutagent
          POSTGRES_PASSWORD: cutagent
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U cutagent -d cutagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      temporal:
        image: temporalio/auto-setup:1.26
        env:
          DB: postgres12
          DB_PORT: 5432
          POSTGRES_USER: cutagent
          POSTGRES_PWD: cutagent
          POSTGRES_SEEDS: postgres
        ports:
          - 7233:7233
    env:
      CUTAGENT_DATABASE_URL: postgresql+psycopg://cutagent:cutagent@localhost:55432/cutagent
      CUTAGENT_STORAGE_BACKEND: sqlalchemy
      CUTAGENT_TEMPORAL_ADDRESS: localhost:7233
      CUTAGENT_TEMPORAL_NAMESPACE: default
      CUTAGENT_TEMPORAL_TASK_QUEUE: cutagent-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Bootstrap database
        run: python scripts/bootstrap_database.py
      - name: Run database integration tests
        env:
          CUTAGENT_RUN_DB_TESTS: "1"
        run: timeout -k 5 600 python -m pytest -q tests/integration
      - name: Run Temporal integration tests
        env:
          CUTAGENT_RUN_TEMPORAL_TESTS: "1"
          CUTAGENT_WORKFLOW_RUNTIME: temporal
        run: timeout -k 5 600 python -m pytest -q tests/temporal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Verify generated API types
        working-directory: apps/web
        run: |
          npm run generate:api
          git diff --exit-code src/api/schema.d.ts
      - name: Build frontend
        working-directory: apps/web
        run: npm run build
