                - paragraph [ref=e364]: 15. 不得无视 slot 对应的人像候选组去随意从全局候选中跳选；如果必须跳出对应组，reason 里要体现原因。
                - paragraph [ref=e365]: portrait 规划偏好：
                - paragraph [ref=e366]: "- 快节奏下可以更频繁切 portrait，但每个切点必须落在完整 ASR 单元结束处。"
                - paragraph [ref=e367]: "- 不要连续多次使用相同视觉信息；主讲画面重复时优先换候选。"
